name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_env }}
    permissions:
      contents: read

    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME != '' && vars.DOCKERHUB_IMAGE_NAME || format('{0}/{1}', secrets.DOCKERHUB_USERNAME, github.event.repository.name) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment file
        id: prepare-env
        env:
          DEPLOY_ENV: ${{ inputs.deploy_env }}
          ENV_FILE_STAGING: ${{ secrets.ENV_FILE_STAGING }}
          ENV_FILE_PROD: ${{ secrets.ENV_FILE_PROD }}
        run: |
          case "$DEPLOY_ENV" in
            staging)
              if [ -z "$ENV_FILE_STAGING" ]; then
                echo "Missing ENV_FILE_STAGING secret"
                exit 1
              fi
              printf '%s' "$ENV_FILE_STAGING" > .env.staging
              echo "app_env=staging" >> "$GITHUB_OUTPUT"
              echo "image_tag_env=staging" >> "$GITHUB_OUTPUT"
              ;;
            production)
              if [ -z "$ENV_FILE_PROD" ]; then
                echo "Missing ENV_FILE_PROD secret"
                exit 1
              fi
              printf '%s' "$ENV_FILE_PROD" > .env.production
              echo "app_env=prod" >> "$GITHUB_OUTPUT"
              echo "image_tag_env=production" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported deploy environment: $DEPLOY_ENV"
              exit 1
              ;;
          esac

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.prepare-env.outputs.image_tag_env }}
            type=raw,value=${{ steps.prepare-env.outputs.image_tag_env }}-{{sha}}
            type=raw,value=latest,enable=${{ inputs.deploy_env == 'production' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          build-args: |
            APP_ENV=${{ steps.prepare-env.outputs.app_env }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    environment: ${{ inputs.deploy_env }}
    permissions:
      contents: read

    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME != '' && vars.DOCKERHUB_IMAGE_NAME || format('{0}/{1}', secrets.DOCKERHUB_USERNAME, github.event.repository.name) }}

    steps:
      - name: Deploy container on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_ENV: ${{ inputs.deploy_env }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SERVER_APP_DIR: ${{ vars.SERVER_APP_DIR != '' && vars.SERVER_APP_DIR || '/srv/nestjs-cli4' }}
          SERVER_REPO_URL: ${{ vars.SERVER_REPO_URL != '' && vars.SERVER_REPO_URL || format('https://github.com/{0}.git', github.repository) }}
          GIT_REF_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          envs: DEPLOY_ENV,IMAGE_NAME,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,SERVER_APP_DIR,SERVER_REPO_URL,GIT_REF_NAME
          script: |
            set -e

            if [ ! -d "$SERVER_APP_DIR/.git" ]; then
              git clone "$SERVER_REPO_URL" "$SERVER_APP_DIR"
            fi

            cd "$SERVER_APP_DIR"
            git fetch --all --prune
            git checkout "$GIT_REF_NAME"
            git reset --hard "origin/$GIT_REF_NAME"

            python3 scripts/deploy.py --deploy-env "$DEPLOY_ENV"

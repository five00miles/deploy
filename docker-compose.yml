services:
  mysql:
    image: mysql:8.4
    container_name: nestjs-prisma-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nest_example
      MYSQL_USER: nestjs
      MYSQL_PASSWORD: nestjs
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
